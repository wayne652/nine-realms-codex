<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ADMIN CODEX</title>
  <link rel="stylesheet" href="styles/codex.css">
</head>
<body class="codex-body admin-body">
  <header class="codex-header admin-header">
    <h1>ADMIN CODEX</h1>
    <p>Worldbuilding Control Panel – Nine Realms</p>
    <nav class="codex-nav">
      <button data-panel="realms">Realms</button>
      <button data-panel="characters">Characters</button>
      <button data-panel="maps">Maps</button>
      <button data-panel="lore">Lore</button>
      <button data-panel="teasers">Teasers</button>
      <button data-panel="books">Books</button>
      <button data-panel="reviews">Reviews</button>
      <button data-panel="fans">Fan Club</button>
    </nav>
  </header>

  <main id="admin-main">
    <section id="panel-realms" class="admin-panel active">
      <h2>Manage Realms</h2>
      <label>Realm ID (short, no spaces)</label>
      <input id="realm-id" placeholder="vearth">

      <label>Realm name</label>
      <input id="realm-name" placeholder="Vearth">

      <label>Realm description</label>
      <textarea id="realm-description" placeholder="Describe the realm..."></textarea>

      <label>Realm icon URL (Cloudinary)</label>
      <input id="realm-icon" placeholder="https://res.cloudinary.com/.../icon.png">

      <label>Realm background URL (Cloudinary)</label>
      <input id="realm-background" placeholder="https://res.cloudinary.com/.../background.png">

      <button id="build-realm-json">Build Realm JSON</button>

      <h3>Copy this into codex.json → "realms" array</h3>
      <textarea id="realm-json-output" class="json-output" readonly></textarea>
    </section>

    <!-- You can duplicate this pattern for characters, maps, lore, etc. later -->

  </main>

  <footer class="codex-footer">
    <span>Admin Codex © Nine Realms</span>
  </footer>

  <script src="scripts/admin.js"></script>
</body>
</html>
